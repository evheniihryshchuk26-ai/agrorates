<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant 1: Sprout + Calculator Grid -->
  <!-- Green rounded square background -->
  <rect width="512" height="512" rx="96" fill="#16a34a"/>

  <!-- Calculator grid lines (subtle, white, low opacity) -->
  <line x1="170" y1="200" x2="170" y2="420" stroke="white" stroke-width="3" opacity="0.25"/>
  <line x1="342" y1="200" x2="342" y2="420" stroke="white" stroke-width="3" opacity="0.25"/>
  <line x1="85" y1="280" x2="427" y2="280" stroke="white" stroke-width="3" opacity="0.25"/>
  <line x1="85" y1="350" x2="427" y2="350" stroke="white" stroke-width="3" opacity="0.25"/>

  <!-- Sprout icon (white, centered upper area) -->
  <!-- Stem -->
  <path d="M256 380 L256 200" stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>
  <!-- Right leaf -->
  <path d="M256 240 C280 200, 340 170, 380 140 C360 200, 310 240, 256 240Z" fill="white"/>
  <!-- Left leaf -->
  <path d="M256 290 C220 260, 160 260, 120 240 C160 290, 220 300, 256 290Z" fill="white"/>
  <!-- Ground line -->
  <line x1="190" y1="380" x2="322" y2="380" stroke="white" stroke-width="14" stroke-linecap="round"/>
</svg>
