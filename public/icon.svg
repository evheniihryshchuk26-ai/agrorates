<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Variant 3: Letter "A" with field furrows -->
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="80" fill="#15803d"/>

  <!-- Stylized "A" made of field rows -->
  <!-- Left leg -->
  <path d="M160 400 L240 120" stroke="white" stroke-width="40" stroke-linecap="round" fill="none"/>
  <!-- Right leg -->
  <path d="M352 400 L272 120" stroke="white" stroke-width="40" stroke-linecap="round" fill="none"/>
  <!-- Crossbar -->
  <line x1="190" y1="300" x2="322" y2="300" stroke="white" stroke-width="30" stroke-linecap="round"/>

  <!-- Three furrow/row lines across the A (representing farm rows) -->
  <line x1="100" y1="360" x2="412" y2="360" stroke="white" stroke-width="4" opacity="0.35"/>
  <line x1="100" y1="340" x2="412" y2="340" stroke="white" stroke-width="4" opacity="0.25"/>
  <line x1="100" y1="380" x2="412" y2="380" stroke="white" stroke-width="4" opacity="0.2"/>

  <!-- Small sprout on top of A -->
  <circle cx="256" cy="105" r="18" fill="#86efac"/>
</svg>
